name: "Test setup-ros"
on:
  pull_request:
  push:
    branches:
      - main
      - "releases/*"
  schedule:
    # Run the CI automatically twice per day to look for flakyness.
    - cron: "0 */12 * * *"

defaults:
  run:
    shell: bash

env:
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

jobs:
  test_environment:
    name: "Check development tools"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macOS-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6.1.0
        with:
          node-version: "24.x"
      - run: .github/workflows/build-and-test.sh
      - uses: ./ # Uses an action in the root directory
      - run: .github/workflows/check-environment.sh

  test_environment_linux:
    name: "Check development tools"
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.docker_image }}
    strategy:
      fail-fast: false
      matrix:
        docker_image:
          - ubuntu:22.04
          - ubuntu:24.04
          - ubuntu:26.04
          - almalinux:9
          - almalinux:10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6.1.0
        with:
          node-version: "24.x"
      - run: .github/workflows/build-and-test.sh
      - uses: ./ # Uses an action in the root directory
      - run: .github/workflows/check-environment.sh

  # Validates that once setup-ros finished, the ROS distribution
  # setup.sh / local_setup.bat can be sourced, and the ROS distribution is
  # functional.
  test_ros_binary_install:
    name: "Check ROS distribution"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          # TODO(ros-tooling/setup-ros#107): Add OS X support
          # - macOS-latest
          - windows-latest
        ros_distribution:
          # Humble Hawksbill (May 2022 - May 2027)
          - humble
          # Jazzy Jalisco (May 2024 - May 2029)
          - jazzy
          # Kilted Kaiju (May 2025 - November 2026)
          - kilted
          # Lyrical Luth (May 2026 - May 2031)
          - lyrical
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6.1.0
        with:
          node-version: "24.x"
      - run: .github/workflows/build-and-test.sh
      - uses: ./ # Uses an action in the root directory
        with:
          required-ros-distributions: ${{ matrix.ros_distribution }}
          # TODO(christophebedard): remove once Lyrical has been released and the Rolling transition to Resolute is complete
          use-ros2-testing: ${{ matrix.ros_distribution == 'lyrical' || matrix.ros_distribution == 'rolling' }}
      - run: .github/workflows/check-environment.sh
      - run: .github/workflows/check-ros2-distribution.sh "${{ matrix.ros_distribution }}"
        if: matrix.os != 'windows-latest'
      - env:
          ROSDISTRO: ${{ matrix.ros_distribution }}
        run: .github/workflows/check-ros2-distribution-win.bat
        shell: cmd
        if: matrix.os == 'windows-latest'

  test_ros_binary_install_linux:
    name: "Check ROS distribution"
    strategy:
      fail-fast: false
      matrix:
        # Define the Docker image(s) associated with each ROS distribution.
        # The include syntax allows additional variables to be defined, like
        # docker_image in this case. See documentation:
        # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#example-including-configurations-in-a-matrix-build
        #
        # Platforms are defined in REP 3: https://ros.org/reps/rep-0003.html
        include:

          # Humble Hawksbill (May 2022 - May 2027)
          - docker_image: ubuntu:jammy
            ros_distribution: humble
            ros_version: 2

          - docker_image: almalinux:8
            ros_distribution: humble
            ros_version: 2

          # Jazzy Jalisco (May 2024 - May 2029)
          - docker_image: ubuntu:noble
            ros_distribution: jazzy
            ros_version: 2

          - docker_image: almalinux:9
            ros_distribution: jazzy
            ros_version: 2

          # Kilted Kaiju (May 2025 - November 2026)
          - docker_image: ubuntu:noble
            ros_distribution: kilted
            ros_version: 2

          - docker_image: almalinux:9
            ros_distribution: kilted
            ros_version: 2

          # Lyrical Luth (May 2026 - May 2031)
          - docker_image: ubuntu:resolute
            ros_distribution: lyrical
            ros_version: 2

          - docker_image: almalinux:10
            ros_distribution: lyrical
            ros_version: 2

          # Rolling Ridley (see REP 2002: https://www.ros.org/reps/rep-2002.html)
          - docker_image: ubuntu:resolute
            ros_distribution: rolling
            ros_version: 2

          - docker_image: almalinux:10
            ros_distribution: rolling
            ros_version: 2

    # ROS 1 tests only run on Ubuntu
    container:
      image: ${{ matrix.docker_image }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6.1.0
        with:
          node-version: "24.x"
      - run: .github/workflows/build-and-test.sh
      - uses: ./ # Uses an action in the root directory
        with:
          required-ros-distributions: ${{ matrix.ros_distribution }}
          # TODO(christophebedard): remove once Lyrical has been released and the Rolling transition to Resolute is complete
          use-ros2-testing: ${{ matrix.ros_distribution == 'lyrical' || matrix.ros_distribution == 'rolling' }}
      - run: .github/workflows/check-environment.sh
      - run: .github/workflows/check-ros-distribution.sh "${{ matrix.ros_distribution }}"
        if: matrix.ros_version == 1
      - run: .github/workflows/check-ros2-distribution.sh "${{ matrix.ros_distribution }}"
        if: matrix.ros_version == 2

  test_repo_with_root_setup_cfg:
    name: "Test with setup.cfg file in root directory (Linux only)"
    runs-on: ubuntu-latest
    container:
      image: ubuntu:26.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6.1.0
        with:
          node-version: "24.x"
      - run: .github/workflows/build-and-test.sh
      - run: cp .github/workflows/test_setup.cfg setup.cfg
      - uses: ./ # Uses an action in the root directory
      - run: colcon --help

  test_on_setup_ros_docker_container:
    name: "Test on a setup-ros-docker container"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ros-tooling/setup-ros-docker/setup-ros-docker-ubuntu-resolute:latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6.1.0
        with:
          node-version: "24.x"
      - run: .github/workflows/build-and-test.sh
      - uses: ./

  test_install_connext:
    name: "Test with RTI Connext DDS"
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.docker_image }}
    strategy:
      fail-fast: false
      matrix:
        docker_image:
          - ubuntu:26.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6.1.0
        with:
          node-version: "24.x"
      - run: .github/workflows/build-and-test.sh
      - uses: ./
        with:
          install-connext: true
      - run: .github/workflows/check-environment.sh
      - run: dpkg -l | grep rti-connext-dds-
